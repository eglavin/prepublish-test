name: Publish Package

on:
  push:
    branches: [main, prerelease/*]
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git user
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "<>"

      - name: Set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: |
          npm install

      - name: Run fork-version
        run: |
          if [ -n "${GITHUB_REF}" ] && [[ "${GITHUB_REF}" == refs/heads/prerelease/* ]]; then
            npx fork-version --pre-release
          else
            npx fork-version
          fi

      - name: Push changes
        run: |
          if [ -n "${GITHUB_REF}" ] && [[ "${GITHUB_REF}" == refs/heads/prerelease/* ]]; then
            git push --follow-tags origin "${GITHUB_REF#refs/heads/}"
          else
            git push --follow-tags origin main
          fi

      - name: Publish to npm
        run: |
          if [ -n "${GITHUB_REF}" ] && [[ "${GITHUB_REF}" == refs/heads/prerelease/* ]]; then
            npm publish --tag prerelease
          else
            npm publish
          fi
